<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ware_ops_algos benchmark dashboard</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>ware_ops_algos benchmark dashboard</h1>

  <section id="cards"></section>

  <section class="controls">
    <label>
      Instance set
      <select id="instanceSet"></select>
    </label>

    <label>
      Metric
      <select id="metric">
        <option value="total_distance">total_distance</option>
        <option value="total_cpu_time">total_cpu_time</option>
        <option value="makespan">makespan</option>
        <option value="on_time_rate">on_time_rate</option>
        <option value="max_tardiness">max_tardiness</option>
      </select>
    </label>
  </section>

  <h2>Performance by algorithm version</h2>
  <div id="performanceChart"></div>

  <h2>Algorithm versions found</h2>
  <div id="versionChart"></div>

  <h2>Results</h2>
  <table id="resultsTable"></table>

  <script src="app.js"></script>
</body>
</html>
