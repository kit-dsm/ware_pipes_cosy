name: foodmart
problem_class: OBRP
objective: Distance

layout:
  type: conventional
  objects:
    - name: LayoutParams
      features:
        - name: start_node
        - name: end_node
        - name: closest_node_to_start
        - name: dist_pick_locations
        - name: n_aisles
        - name: n_pick_locations
        - name: n_blocks
          value: 2
        - name: dist_top_to_pick_location
        - name: dist_bottom_to_pick_location
        - name: start_location
        - name: end_location
        - name: min_aisle_position
        - name: max_aisle_position

    - name: LayoutNetwork
      features:
        - name: graph
        - name: distance_matrix
        - name: predecessor_matrix

articles:
  type: standard
  objects:
    - name: Article
      features:
        - name: article_id
        - name: weight
        - name: volume

orders:
  type: standard
  objects:
    - name: Order
      features:
        - name: order_number
        - name: order_date

      objects:
        - name: OrderPosition
          features:
            - name: amount
            - name: article_id

resources:
  type: human
  objects:
    - name: Resource
      type: human
      features:
        - name: speed
        - name: time_per_pick

      objects:
        - name: PickCart
          type: manual
          features:
            - name: capacities
            - name: dimensions_type
              value: [items]

storage:
  type: dedicated
  objects:
    - name: StorageLocations
      features:
        - name: amount
        - name: article_id
